name: Auto Update Alvin9999

on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟执行一次
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write  # 允许写入仓库内容

jobs:
  update-wiki-readme:
    runs-on: ubuntu-latest

    steps:
      # 1. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 2. 安装 Python 依赖
      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      # 3. 运行更新脚本        
      - name: Run Update Script
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seacdr/AX6-OpenWRT/Alvin9999.git
          python Alvin9999/update.py

      # 6. 提交和推送更新到主仓库（Alvin9999.md）
      - name: Commit and Push Alvin9999 Updates
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "actions@github.com"
          git add Alvin9999.md
          git commit -m "Auto-update Alvin9999.md: Update timestamp" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/seacdr/AX6-OpenWRT.git
