name: Build OpenWRT for AX6-DEMO

on:
  workflow_dispatch:      # 支持手动触发

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: AX6-NSS/.config
  DIY_SH: AX6-NSS/diy.sh
  FILES: AX6-NSS/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Check machine configuration
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：7763,8370C,8272CL,8171M,E5系列"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "--------------------------硬盘信息--------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "硬盘详情："
        df -Th

    - name: Checkout
      uses: actions/checkout@main

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: | 
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/2305)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: cache wrt build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: AX6-NSS-${{ env.REPO_BRANCH }}
        prefix: ${{ github.workspace }}/openwrt

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        chmod -R 755 openwrt
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH

        # 获取内核版本
        KERNEL_PATCHVER=$(grep '^KERNEL_PATCHVER' target/linux/*/Makefile | head -n1 | awk -F '=' '{print $2}' | tr -d '[:space:]')
        echo "-内核主版本: ${KERNEL_PATCHVER}"
        KERNEL_FILE="target/linux/generic/kernel-${KERNEL_PATCHVER}"
        KERNEL_SUBVER=$(grep "LINUX_VERSION-${KERNEL_PATCHVER}" "${KERNEL_FILE}" | awk -F '=' '{print $2}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        echo "-内核补丁: ${KERNEL_SUBVER}"
        KERNEL_VERSION="${KERNEL_PATCHVER}${KERNEL_SUBVER}"
        echo "1、内核版本: ${KERNEL_VERSION}"

        # 获取LuCI版本
        LUCI_COMMIT=$(git -C feeds/luci rev-parse --short HEAD)
        LUCI_YEAR=$(git -C feeds/luci log -1 --format='%cd' --date=format:%y)
        LUCI_DAY=$(git -C feeds/luci log -1 --format='%cd' --date=format:%j)
        LUCI_COMMIT_COUNT=$(git -C feeds/luci rev-list --count HEAD)
        LUCI_VERSION="LuCI Master ${LUCI_YEAR}.${LUCI_DAY}.${LUCI_COMMIT_COUNT}~${LUCI_COMMIT}"
        echo "2、固件版本：${LUCI_VERSION}"

        # 获取软件包
        LUCI_LIBS=$(grep -E '^CONFIG_PACKAGE_[^=]+=y$' .config | grep -v -E '^CONFIG_PACKAGE_luci-app[a-z0-9_-]*=y$' | sed 's/^CONFIG_PACKAGE_//;s/=y$//' | sort | paste -sd ',' -)
        LUCI_APPS=$(grep -E '^CONFIG_PACKAGE_[^=]+=y$' .config | grep    -E '^CONFIG_PACKAGE_luci-app[a-z0-9_-]*=y$' | sed 's/^CONFIG_PACKAGE_//;s/=y$//' | sort)
        echo "-软件包依赖：${LUCI_LIBS}"
        echo "3、软件包：${LUCI_APPS}"

        # 创建 release_body.md 文件
        BODY_FILE="${GITHUB_WORKSPACE}/release_body.md"
        echo "" >> $BODY_FILE
        echo "基于VIKINGYFY合并的immortalwrt构建，首次使用建议全新刷写，NSS满血加速！" >> $BODY_FILE
        echo "" >> $BODY_FILE
        echo "* 基本信息" >> $BODY_FILE
        echo "IP: 192.168.21.1" >> $BODY_FILE
        echo "账户: root" >> $BODY_FILE
        echo "密码: 空" >> $BODY_FILE
        echo "" >> $BODY_FILE
        echo "内核版本: ${KERNEL_VERSION}" >> $BODY_FILE
        echo "固件版本：${LUCI_VERSION}" >> $BODY_FILE
        echo "软件包：${LUCI_APPS}" >> $BODY_FILE
        echo "软件包依赖：${LUCI_LIBS}" >> $BODY_FILE
        # 将文件路径保存到环境变量
        echo "BODY_FILE=$BODY_FILE" >> $GITHUB_ENV
        echo "CURRENT_DATE=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_ENV


    - name: cp output to upload file
      run: |
        df -hT
        mkdir -p upload        
        # 使用shopt nullglob避免通配符错误
        shopt -s nullglob
        cp -v openwrt/bin/targets/*/*/*.ubi upload/ || true
        cp -v openwrt/bin/targets/*/*/*.bin upload/ || true
        cp -v ${{ env.BODY_FILE }} upload/ || true
        shopt -u nullglob
        echo "上传内容:"
        tree upload/

    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      with:
        tag: AX6_NSS_${{ env.CURRENT_DATE }}
        artifacts: upload/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        bodyFile: ${{ env.BODY_FILE }}

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 10
        delete_tags : true
